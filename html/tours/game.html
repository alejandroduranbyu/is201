<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>:)</title>
  <style>
    body { margin: 0; background: #1a1a1a; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: monospace; }
    #wrap { display: flex; flex-direction: column; align-items: center; }
    h1 { color: #7fff7f; font-size: 28px; margin: 0 0 4px; }
    p.sub { color: #888; font-size: 13px; margin: 0 0 14px; }
    #hud { display: flex; gap: 40px; margin-bottom: 12px; }
    .stat { text-align: center; }
    .stat-label { font-size: 11px; color: #666; }
    .stat-val { font-size: 22px; font-weight: bold; color: #ccc; }
    canvas { border: 1px solid #333; background: #111; border-radius: 8px; display: block; }
    #msg { color: #888; font-size: 14px; margin: 8px 0; min-height: 20px; }
    button { padding: 9px 32px; font-size: 14px; font-family: monospace; background: #2a2a2a; color: #ccc; border: 1px solid #444; border-radius: 6px; cursor: pointer; margin-top: 4px; }
    button:hover { background: #333; }
    .controls { color: #444; font-size: 12px; margin-top: 10px; }
  </style>
</head>
<body>
<a href="../navigation/exhibition.html" style="position:absolute; top:16px; left:20px; color:#7fff7f; font-family:monospace; font-size:22px; text-decoration:none; opacity:0.7;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.7'">← Back</a>
<div id="wrap">
  <h1>:)</h1>
  <p class="sub">You could use more smiles</p>
  <div id="hud">
    <div class="stat"><div class="stat-label">SCORE</div><div class="stat-val" id="score">0</div></div>
    <div class="stat"><div class="stat-label">HIGH SCORE</div><div class="stat-val" id="hi">0</div></div>
    <div class="stat"><div class="stat-label">LEVEL</div><div class="stat-val" id="level">1</div></div>
  </div>
  <canvas id="gameCanvas" width="400" height="400"></canvas>
  <div id="msg">Press Start or Space to play</div>
  <button id="startBtn">Start Game</button>
  <div class="controls">Arrow keys or WASD · Space to pause</div>
</div>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const CELL = 20, COLS = 20, ROWS = 20;
let snake, dir, nextDir, food, score, hiScore = 0, running = false, paused = false, intervalId;

function initGame() {
  snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir = {x:1,y:0}; nextDir = {x:1,y:0};
  score = 0; updateHUD();
  placeFood(); running = true; paused = false;
  document.getElementById('msg').textContent = '';
  clearInterval(intervalId);
  intervalId = setInterval(tick, getSpeed());
  draw();
}

function getSpeed() { return Math.max(80, 200 - Math.floor(score / 50) * 20); }
function getLevel() { return Math.floor(score / 50) + 1; }

function placeFood() {
  let pos;
  do { pos = {x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS)}; }
  while (snake.some(s => s.x === pos.x && s.y === pos.y));
  food = pos;
}

function tick() {
  if (!running || paused) return;
  dir = nextDir;
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS || snake.some(s => s.x === head.x && s.y === head.y)) {
    gameOver(); return;
  }
  snake.unshift(head);
  if (head.x === food.x && head.y === food.y) {
    score += 10; if (score > hiScore) hiScore = score;
    updateHUD(); placeFood();
    clearInterval(intervalId);
    intervalId = setInterval(tick, getSpeed());
  } else { snake.pop(); }
  draw();
}

function draw() {
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = '#1e1e1e'; ctx.lineWidth = 0.5;
  for (let i = 0; i < COLS; i++) for (let j = 0; j < ROWS; j++) ctx.strokeRect(i * CELL, j * CELL, CELL, CELL);

  snake.forEach((s, i) => {
    ctx.fillStyle = i === 0 ? '#7fff7f' : '#4dd44d';
    ctx.font = `bold ${CELL - 2}px monospace`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(':)', s.x * CELL + CELL / 2, s.y * CELL + CELL / 2 + 1);
  });

  ctx.fillStyle = '#ff6b6b';
  ctx.font = `bold ${CELL}px monospace`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('★', food.x * CELL + CELL / 2, food.y * CELL + CELL / 2 + 1);
}

function updateHUD() {
  document.getElementById('score').textContent = score;
  document.getElementById('hi').textContent = hiScore;
  document.getElementById('level').textContent = getLevel();
}

function gameOver() {
  running = false; clearInterval(intervalId);
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#ff6b6b'; ctx.font = 'bold 28px monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 18);
  ctx.fillStyle = '#aaa'; ctx.font = '16px monospace';
  ctx.fillText('Score: ' + score, canvas.width / 2, canvas.height / 2 + 16);
  document.getElementById('msg').textContent = 'Press Start or Space to play again';
}

document.addEventListener('keydown', e => {
  const map = {
    ArrowUp:{x:0,y:-1}, ArrowDown:{x:0,y:1}, ArrowLeft:{x:-1,y:0}, ArrowRight:{x:1,y:0},
    KeyW:{x:0,y:-1}, KeyS:{x:0,y:1}, KeyA:{x:-1,y:0}, KeyD:{x:1,y:0}
  };
  if (map[e.code]) {
    const nd = map[e.code];
    if (nd.x !== -dir.x || nd.y !== -dir.y) nextDir = nd;
    e.preventDefault();
  }
  if (e.code === 'Space') {
    e.preventDefault();
    if (!running) { initGame(); return; }
    paused = !paused;
    document.getElementById('msg').textContent = paused ? 'Paused' : '';
    if (!paused) draw();
  }
});

document.getElementById('startBtn').addEventListener('click', initGame);
</script>
</body>
</html>
